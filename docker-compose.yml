services:
  pi-web:
    build: .
    container_name: pi-web
    ports:
      - "3005:3000"
      - "3006:3001"
    volumes:
      - pi-data:/home/node/.pi
      - pi-projects:/projects
      - pi-sessions:/sessions
      - pi-npm-be:/app/backend/node_modules
      - pi-dist-be:/app/backend/dist
      - pi-npm-fe:/app/frontend/node_modules
      - pi-dist-fe:/app/frontend/dist
    environment:
      - NODE_ENV=development
    stdin_open: true
    tty: true
    restart: unless-stopped

volumes:
  pi-data:
  pi-projects:
  pi-sessions:
  pi-npm-be:
  pi-dist-be:
  pi-npm-fe:
  pi-dist-fe:
