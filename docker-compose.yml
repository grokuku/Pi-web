services:
  pi-web:
    build: .
    container_name: pi-web
    ports:
      - "3005:3000"
    volumes:
      - /mnt/user/appdata-ssd/Pi-web/data/pi-data:/root/.pi
      - /mnt/user/appdata-ssd/Pi-web/data/pi-projects:/projects
      - /mnt/user/appdata-ssd/Pi-web/data/pi-sessions:/sessions
      - /mnt/user/appdata-ssd/Pi-web/data/pi-appdata:/app/.data
    environment:
      - NODE_ENV=development
      - ALLOWED_ORIGINS=https://pi.holaf.fr,http://pi.holaf.fr,http://10.10.0.5:3005,http://localhost:3000,http://localhost:3005,http://localhost:5173
    stdin_open: true
    tty: true
    restart: unless-stopped
